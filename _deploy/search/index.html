
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索</title>
    <link rel="stylesheet" href="/GraphcityBlog/static/blog/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
    
<script>
// 客户端搜索（静态站点）
(function() {
    const form = document.querySelector('main .search-form');
    if (!form) return;
    const input = form.querySelector('.search-input');
    const results = document.querySelector('.search-results');
    const summary = document.querySelector('.search-summary');
    const articleTab = document.querySelector('.search-tabs');
    let index = null;

    function getBase() {
        const path = location.pathname;
        return path.startsWith('/GraphcityBlog/') || path === '/GraphcityBlog' ? '/GraphcityBlog' : '';
    }

    async function loadIndex() {
        if (index) return index;
        const resp = await fetch(getBase() + '/search_index.json');
        index = await resp.json();
        return index;
    }

    function score(item, keywords) {
        const title = (item.title || '').toLowerCase();
        const tags = (item.tags || item.lang || '').toLowerCase();
        const content = (item.content || item.desc || '').toLowerCase();
        let s = 0;
        for (const kw of keywords) {
            if (title.includes(kw)) s += 10;
            if (tags.includes(kw)) s += 5;
            if (content.includes(kw)) s += 1;
        }
        return s;
    }

    async function doSearch(q) {
        const data = await loadIndex();
        const keywords = q.split(/[\s,，]+/).filter(Boolean).map(k => k.toLowerCase());
        if (!keywords.length) return { articles: [], projects: [] };
        const scored = data.map(item => ({ ...item, _score: score(item, keywords) }))
            .filter(item => item._score > 0)
            .sort((a, b) => b._score - a._score);
        return {
            articles: scored.filter(item => item.type === 'article'),
            projects: scored.filter(item => item.type === 'project'),
        };
    }

    function ensureContainer() {
        let r = document.querySelector('.search-results');
        if (!r) {
            r = document.createElement('div');
            r.className = 'search-results';
            const summary = document.querySelector('.search-summary');
            const empty = document.querySelector('.search-empty');
            const ref = summary || empty || document.querySelector('.search-form');
            ref.parentNode.insertBefore(r, ref.nextSibling);
        }
        return r;
    }

    function render(result, q) {
        const { articles, projects } = result;
        const container = ensureContainer();
        let html = '';
        const total = articles.length + projects.length;
        let sm = document.querySelector('.search-summary');
        if (!sm) {
            sm = document.createElement('p');
            sm.className = 'search-summary';
            container.parentNode.insertBefore(sm, container);
        }
        sm.textContent = '共 ' + total + ' 个结果';
        // 移除旧空状态
        const empty = document.querySelector('.search-empty');
        if (empty) empty.remove();

        // Tabs
        let tabs = document.querySelector('.search-tabs');
        if (!tabs) {
            tabs = document.createElement('div');
            tabs.className = 'search-tabs';
            container.parentNode.insertBefore(tabs, container);
        }
        tabs.innerHTML = `
            <a href="#" class="search-tab active">文章 · ${articles.length}</a>
            <a href="#" class="search-tab">项目 · ${projects.length}</a>
        `;
        tabs.querySelectorAll('a').forEach((a, i) => {
            a.onclick = function(e) {
                e.preventDefault();
                tabs.querySelectorAll('a').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('js-article-results').style.display = i === 0 ? '' : 'none';
                document.getElementById('js-project-results').style.display = i === 1 ? '' : 'none';
            };
        });

        html += '<div id="js-article-results">';
        if (articles.length) {
            html += '<div class="article-list">';
            for (const a of articles) {
                html += `<div class="article-card" onclick="location.href='${getBase()}/article/${a.slug}/'">
                    <div class="art-bar"></div><div class="art-body">
                    <span class="art-title">${a.title}</span>
                    <span class="art-date">${a.date||''}</span>
                    ${a.tags ? '<span class="art-tags">'+a.tags.split(',').map(t=>`<span class="tag-pill">${t.trim()}</span>`).join('')+'</span>' : ''}
                </div></div>`;
            }
            html += '</div>';
        } else {
            html += '<p class="search-empty">没有找到匹配的文章</p>';
        }
        html += '</div><div id="js-project-results" style="display:none">';
        if (projects.length) {
            html += '<div class="project-grid">';
            for (const p of projects) {
                html += `<div class="project-card" onclick="location.href='${getBase()}/project/${encodeURIComponent(p.title)}/'">
                    <h3>${p.title}</h3><p>${p.desc||''}</p>
                    ${p.lang?`<span class="proj-lang">${p.lang}</span>`:''}
                </div>`;
            }
            html += '</div>';
        } else {
            html += '<p class="search-empty">没有找到匹配的项目</p>';
        }
        html += '</div>';
        container.innerHTML = html;
    }

    form.onsubmit = async function(e) {
        e.preventDefault();
        const q = input.value.trim();
        if (!q) return;
        document.querySelector('.article-header h1').textContent = '「' + q + '」的搜索结果';
        const result = await doSearch(q);
        render(result, q);
    };

    // 页面加载时检查 URL 参数
    const params = new URLSearchParams(location.search);
    const q = params.get('q');
    if (q && !document.querySelector('.search-results .article-list, .search-results .project-grid')) {
        document.querySelector('.article-header h1').textContent = '「' + q + '」的搜索结果';
        doSearch(q).then(r => render(r, q));
    }
})();
</script>

</head>
<body>
    <nav>
        <div class="nav-inner">
            <a class="brand" href="/GraphcityBlog/">Graphcity Blog</a>
            <div class="nav-links">
                <a href="/GraphcityBlog/articles/">文章</a>
                <a href="/GraphcityBlog/projects/">项目</a>
                <a href="/GraphcityBlog/archive/">归档</a>
                <a href="/GraphcityBlog/about/">关于</a>
            </div>
            <div class="nav-right">
                <form action="/GraphcityBlog/search/" method="get" class="search-form">
                    <input type="text" name="q" placeholder="搜索文章、项目…" value="">
                    <button type="submit">搜索</button>
                </form>
            </div>
        </div>
    </nav>
    <main>
        
<header class="article-header header-thick">
    <div class="article-header-bar"></div>
    <div class="article-header-body">
        <h1>搜索</h1>
    </div>
</header>

<form class="search-form" method="get" action="/GraphcityBlog/search/">
    <input class="search-input" type="text" name="q" value="" placeholder="搜索文章、项目…" autofocus>
    <button class="search-btn" type="submit">搜索</button>
</form>


    <p class="search-empty">输入关键词，搜索文章和项目</p>


    </main>
    <footer>
        <div class="theme-switcher">
            <span class="theme-dot" data-theme="teal" style="background:#339596" title="青绿"></span>
            <span class="theme-dot" data-theme="blue" style="background:#3360AB" title="蓝色"></span>
            <span class="theme-dot" data-theme="rose" style="background:#d4627c" title="玫红"></span>
            <span class="theme-dot" data-theme="orange" style="background:#e08a3e" title="橘橙"></span>
            <span class="theme-dot" data-theme="purple" style="background:#7c5aa8" title="紫色"></span>
            <span class="theme-dot" data-theme="green" style="background:#4a9c5d" title="草绿"></span>
            <span class="theme-dot" data-theme="slate" style="background:#5a7a8a" title="灰蓝"></span>
            <span class="theme-dot" data-theme="sky" style="background:#4A90D9" title="天蓝"></span>
        </div>
        <p>&copy; 2026 Graphcity</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <script>
        // TOC 滚动高亮
        (function() {
            const tocAside = document.querySelector('.article-toc');
            if (!tocAside) return;
            const headings = document.querySelectorAll('.article-body h1[id], .article-body h2[id], .article-body h3[id], .article-body h4[id]');
            if (!headings.length) return;
            const tocMap = {};
            tocAside.querySelectorAll('a[href^="#"]').forEach(a => {
                const id = a.getAttribute('href').slice(1);
                tocMap[id] = a;
            });
            function update() {
                const scrollTop = window.scrollY + 100;
                let activeId = null;
                headings.forEach(h => {
                    if (h.getBoundingClientRect().top + window.scrollY <= scrollTop) activeId = h.id;
                });
                tocAside.querySelectorAll('a').forEach(a => a.classList.remove('active'));
                if (activeId && tocMap[activeId]) tocMap[activeId].classList.add('active');
            }
            let ticking = false;
            window.addEventListener('scroll', () => {
                if (!ticking) { requestAnimationFrame(() => { update(); ticking = false; }); ticking = true; }
            });
            update();
        })();

        // 禁用 B 站外链自动播放
        document.querySelectorAll('iframe[src*="bilibili"]').forEach(f => {
            if (f.src.includes('autoplay=')) {
                f.src = f.src.replace(/([?&])autoplay=1/, '$1autoplay=0');
            } else {
                f.src += (f.src.includes('?') ? '&' : '?') + 'autoplay=0';
            }
        });
    </script>
    <script>
        const themes = {
            teal:    { primary:'#339596', primaryDark:'#277576', codeBg:'#1a2e2f', codeText:'#d6e2f5', shadowRgb:'51,149,150', badgeBg:'#eaf4f4' },
            blue:    { primary:'#3360AB', primaryDark:'#254a85', codeBg:'#1a2540', codeText:'#d0dcf0', shadowRgb:'51,96,171', badgeBg:'#eef2fa' },
            rose:    { primary:'#d4627c', primaryDark:'#a3435c', codeBg:'#2f1a22', codeText:'#f0d6e0', shadowRgb:'212,98,124', badgeBg:'#faf0f4' },
            orange:  { primary:'#e08a3e', primaryDark:'#b06828', codeBg:'#2f2218', codeText:'#f0e2d4', shadowRgb:'224,138,62', badgeBg:'#faf4ec' },
            purple:  { primary:'#7c5aa8', primaryDark:'#5c3e86', codeBg:'#1f1a2f', codeText:'#dcd4f0', shadowRgb:'124,90,168', badgeBg:'#f4f0fa' },
            green:   { primary:'#4a9c5d', primaryDark:'#357a44', codeBg:'#182a1e', codeText:'#d4f0dc', shadowRgb:'74,156,93', badgeBg:'#eefaf0' },
            slate:   { primary:'#5a7a8a', primaryDark:'#3f5d6b', codeBg:'#1a242a', codeText:'#d4e0e8', shadowRgb:'90,122,138', badgeBg:'#f0f4f6' },
            sky:     { primary:'#4A90D9', primaryDark:'#3570ad', codeBg:'#19253a', codeText:'#d4e2f4', shadowRgb:'74,144,217', badgeBg:'#eef3fa' },
        };
        const saved = localStorage.getItem('blog-theme') || 'teal';
        function applyTheme(name) {
            const t = themes[name];
            const r = document.querySelector(':root');
            r.style.setProperty('--primary', t.primary);
            r.style.setProperty('--primary-dark', t.primaryDark);
            r.style.setProperty('--code-bg', t.codeBg);
            r.style.setProperty('--code-text', t.codeText);
            r.style.setProperty('--shadow-rgb', t.shadowRgb);
            r.style.setProperty('--badge-bg', t.badgeBg);
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === name));
            localStorage.setItem('blog-theme', name);
        }
        applyTheme(saved);
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.onclick = () => applyTheme(dot.dataset.theme);
        });

        document.querySelectorAll('pre').forEach(pre => {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = '复制';
            btn.onclick = () => {
                navigator.clipboard.writeText(pre.textContent).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制', 1500);
                });
            };
            pre.style.position = 'relative';
            pre.appendChild(btn);
        });
    </script>
</body>
</html>
