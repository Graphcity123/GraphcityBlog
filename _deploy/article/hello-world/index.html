    </main>
    <footer>
        <div class="theme-switcher">
            <span class="theme-dot" data-theme="teal" style="background:#339596" title="青绿"></span>
            <span class="theme-dot" data-theme="blue" style="background:#3360AB" title="蓝色"></span>
            <span class="theme-dot" data-theme="rose" style="background:#d4627c" title="玫红"></span>
            <span class="theme-dot" data-theme="orange" style="background:#e08a3e" title="橘橙"></span>
            <span class="theme-dot" data-theme="purple" style="background:#7c5aa8" title="紫色"></span>
            <span class="theme-dot" data-theme="green" style="background:#4a9c5d" title="草绿"></span>
            <span class="theme-dot" data-theme="slate" style="background:#5a7a8a" title="灰蓝"></span>
        </div>
        <p>&copy; 2026 Graphcity</p>
    </footer>
    <script>
        const themes = {
            teal:    { primary:'#339596', primaryDark:'#277576', codeBg:'#1a2e2f', codeText:'#d6e2f5', shadowRgb:'51,149,150', badgeBg:'#eaf4f4' },
            blue:    { primary:'#3360AB', primaryDark:'#254a85', codeBg:'#1a2540', codeText:'#d0dcf0', shadowRgb:'51,96,171', badgeBg:'#eef2fa' },
            rose:    { primary:'#d4627c', primaryDark:'#a3435c', codeBg:'#2f1a22', codeText:'#f0d6e0', shadowRgb:'212,98,124', badgeBg:'#faf0f4' },
            orange:  { primary:'#e08a3e', primaryDark:'#b06828', codeBg:'#2f2218', codeText:'#f0e2d4', shadowRgb:'224,138,62', badgeBg:'#faf4ec' },
            purple:  { primary:'#7c5aa8', primaryDark:'#5c3e86', codeBg:'#1f1a2f', codeText:'#dcd4f0', shadowRgb:'124,90,168', badgeBg:'#f4f0fa' },
            green:   { primary:'#4a9c5d', primaryDark:'#357a44', codeBg:'#182a1e', codeText:'#d4f0dc', shadowRgb:'74,156,93', badgeBg:'#eefaf0' },
            slate:   { primary:'#5a7a8a', primaryDark:'#3f5d6b', codeBg:'#1a242a', codeText:'#d4e0e8', shadowRgb:'90,122,138', badgeBg:'#f0f4f6' },
        };
        const saved = localStorage.getItem('blog-theme') || 'teal';
        function applyTheme(name) {
            const t = themes[name];
            const r = document.querySelector(':root');
            r.style.setProperty('--primary', t.primary);
            r.style.setProperty('--primary-dark', t.primaryDark);
            r.style.setProperty('--code-bg', t.codeBg);
            r.style.setProperty('--code-text', t.codeText);
            r.style.setProperty('--shadow-rgb', t.shadowRgb);
            r.style.setProperty('--badge-bg', t.badgeBg);
            document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.dataset.theme === name));
            localStorage.setItem('blog-theme', name);
        }
        applyTheme(saved);
        document.querySelectorAll('.theme-dot').forEach(dot => {
            dot.onclick = () => applyTheme(dot.dataset.theme);
        });

        document.querySelectorAll('pre').forEach(pre => {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = '复制';
            btn.onclick = () => {
                navigator.clipboard.writeText(pre.textContent).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制', 1500);
                });
            };
            pre.style.position = 'relative';
            pre.appendChild(btn);
        });
    </script>
</body>
</html>
