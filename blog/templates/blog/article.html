{% extends 'blog/base.html' %}

{% block title %}{{ title }} — Graphcity Blog{% endblock %}

{% block content %}
<header class="article-header">
    <div class="article-header-bar"></div>
    <div class="article-header-body">
        <h1>{{ title }}</h1>
        {% if date %}<time>{{ date }}</time>{% endif %}
        {% if tags %}<div class="tags">{{ tags }}</div>{% endif %}
    </div>
</header>

<div class="article-layout">
    <article>
        <div class="article-body">
            {{ content }}
        </div>
    </article>
    {% if toc %}
    <aside class="article-toc">
        <div class="toc-title">目录</div>
        {{ toc }}
    </aside>
    {% endif %}
</div>

<div class="back-link">
    <a href="{% url 'home' %}">← 返回文章列表</a>
</div>
{% endblock %}
