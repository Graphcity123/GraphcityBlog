{% extends 'blog/base.html' %}

{% block title %}{{ title }} — Graphcity Blog{% endblock %}

{% block content %}
<header class="article-header">
    <div class="article-header-bar"></div>
    <div class="article-header-body">
        <h1>{{ title }}</h1>
        {% if lang %}<div class="proj-tags"><a href="{% url 'archive' %}?tag={{ lang|urlencode }}&tab=project" class="proj-lang" style="text-decoration:none">{{ lang }}</a></div>{% endif %}
        {% if desc %}<p class="proj-desc">{{ desc }}</p>{% endif %}
        <p class="proj-link"><strong>项目地址：</strong><a href="{{ url }}" target="_blank">{{ url }}</a></p>
    </div>
</header>

<div class="article-layout">
    <article>
        <div class="article-body">
            {{ content }}
        </div>
    </article>
    <aside class="article-toc">
        <div class="toc-title">目录</div>
        {{ toc|default:'' }}
    </aside>
</div>

<div class="back-link">
    <a href="{% url 'home' %}">← 返回首页</a>
</div>
{% endblock %}
